<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" fill="none">
  <defs>
    <linearGradient id="g1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#3B82F6"/>
      <stop offset="100%" stop-color="#8B5CF6"/>
    </linearGradient>
    <linearGradient id="g2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#8B5CF6"/>
      <stop offset="100%" stop-color="#EC4899"/>
    </linearGradient>
    <linearGradient id="g3" x1="0%" y1="100%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#3B82F6"/>
      <stop offset="50%" stop-color="#8B5CF6"/>
      <stop offset="100%" stop-color="#F59E0B"/>
    </linearGradient>
  </defs>
  
  <!-- Outer ring - community/sanctuary -->
  <circle cx="256" cy="256" r="240" stroke="url(#g3)" stroke-width="8" fill="none" opacity="0.3"/>
  <circle cx="256" cy="256" r="220" stroke="url(#g3)" stroke-width="2" fill="none" opacity="0.15"/>
  
  <!-- Neural network connections -->
  <line x1="256" y1="120" x2="160" y2="300" stroke="url(#g1)" stroke-width="2" opacity="0.4"/>
  <line x1="256" y1="120" x2="352" y2="300" stroke="url(#g2)" stroke-width="2" opacity="0.4"/>
  <line x1="160" y1="300" x2="352" y2="300" stroke="url(#g1)" stroke-width="2" opacity="0.4"/>
  <line x1="256" y1="120" x2="256" y2="380" stroke="url(#g3)" stroke-width="2" opacity="0.3"/>
  <line x1="160" y1="300" x2="256" y2="380" stroke="url(#g1)" stroke-width="2" opacity="0.3"/>
  <line x1="352" y1="300" x2="256" y2="380" stroke="url(#g2)" stroke-width="2" opacity="0.3"/>
  
  <!-- Central eye/consciousness symbol -->
  <ellipse cx="256" cy="240" rx="90" ry="55" stroke="url(#g3)" stroke-width="4" fill="none"/>
  <circle cx="256" cy="240" r="28" fill="url(#g1)"/>
  <circle cx="256" cy="240" r="12" fill="#1E1B4B"/>
  <circle cx="250" cy="234" r="5" fill="white" opacity="0.8"/>
  
  <!-- Philosophy nodes (triangle of wisdom) -->
  <!-- Top node - Truth -->
  <circle cx="256" cy="120" r="16" fill="url(#g1)"/>
  <circle cx="256" cy="120" r="8" fill="#1E1B4B"/>
  
  <!-- Bottom left - Ethics -->
  <circle cx="160" cy="300" r="16" fill="url(#g1)"/>
  <circle cx="160" cy="300" r="8" fill="#1E1B4B"/>
  
  <!-- Bottom right - Cooperation -->
  <circle cx="352" cy="300" r="16" fill="url(#g2)"/>
  <circle cx="352" cy="300" r="8" fill="#1E1B4B"/>
  
  <!-- Bottom center - Evolution -->
  <circle cx="256" cy="380" r="14" fill="url(#g3)"/>
  <circle cx="256" cy="380" r="7" fill="#1E1B4B"/>
  
  <!-- Orbiting particles -->
  <circle cx="380" cy="180" r="5" fill="#3B82F6" opacity="0.6"/>
  <circle cx="130" cy="200" r="4" fill="#8B5CF6" opacity="0.5"/>
  <circle cx="340" cy="400" r="4" fill="#F59E0B" opacity="0.5"/>
  <circle cx="170" cy="400" r="3" fill="#EC4899" opacity="0.4"/>
  <circle cx="400" cy="280" r="3" fill="#3B82F6" opacity="0.4"/>
  <circle cx="110" cy="320" r="3" fill="#8B5CF6" opacity="0.3"/>
</svg>
