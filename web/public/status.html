<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Agent Status Monitor</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #0a0a1a; color: #e2e8f0; min-height: 100vh; display: flex; align-items: center; justify-content: center; }
  .card { background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%); border: 1px solid #2d3748; border-radius: 16px; padding: 32px; width: 400px; max-width: 95vw; box-shadow: 0 20px 60px rgba(0,0,0,0.5); }
  .header { display: flex; align-items: center; gap: 12px; margin-bottom: 24px; }
  .pulse { width: 12px; height: 12px; border-radius: 50%; animation: pulse 2s infinite; }
  .pulse.working { background: #10b981; box-shadow: 0 0 12px #10b981; }
  .pulse.idle { background: #f59e0b; box-shadow: 0 0 12px #f59e0b; }
  .pulse.sleeping { background: #ef4444; box-shadow: 0 0 12px #ef4444; }
  @keyframes pulse { 0%, 100% { opacity: 1; transform: scale(1); } 50% { opacity: 0.5; transform: scale(0.8); } }
  .title { font-size: 18px; font-weight: 700; }
  .subtitle { font-size: 12px; color: #94a3b8; }
  .status-badge { display: inline-flex; align-items: center; gap: 8px; padding: 6px 16px; border-radius: 20px; font-size: 14px; font-weight: 600; margin-bottom: 20px; }
  .status-badge.working { background: #10b98120; color: #10b981; border: 1px solid #10b98140; }
  .status-badge.idle { background: #f59e0b20; color: #f59e0b; border: 1px solid #f59e0b40; }
  .status-badge.sleeping { background: #ef444420; color: #ef4444; border: 1px solid #ef444440; }
  .field { margin-bottom: 16px; }
  .field-label { font-size: 11px; text-transform: uppercase; letter-spacing: 1px; color: #64748b; margin-bottom: 4px; }
  .field-value { font-size: 14px; color: #e2e8f0; }
  .task-list { list-style: none; max-height: 200px; overflow-y: auto; }
  .task-list li { padding: 8px 0; border-bottom: 1px solid #2d374850; font-size: 13px; display: flex; align-items: center; gap: 8px; }
  .task-list li::before { content: '✅'; font-size: 12px; }
  .task-time { color: #64748b; font-size: 11px; margin-left: auto; white-space: nowrap; }
  .progress { height: 4px; background: #2d3748; border-radius: 2px; margin-top: 8px; overflow: hidden; }
  .progress-bar { height: 100%; background: linear-gradient(90deg, #3b82f6, #8b5cf6); border-radius: 2px; transition: width 0.5s ease; }
  .footer { margin-top: 20px; padding-top: 16px; border-top: 1px solid #2d3748; display: flex; justify-content: space-between; align-items: center; }
  .footer span { font-size: 11px; color: #64748b; }
  .refresh-btn { background: none; border: 1px solid #4b5563; color: #94a3b8; padding: 4px 12px; border-radius: 6px; cursor: pointer; font-size: 11px; }
  .refresh-btn:hover { border-color: #6b7280; color: #e2e8f0; }
</style>
</head>
<body>

<div class="card" id="status-card">
  <div class="header">
    <div class="pulse" id="pulse"></div>
    <div>
      <div class="title" id="agent-name">Agent</div>
      <div class="subtitle">OpenClaw Agent Monitor</div>
    </div>
  </div>

  <div class="status-badge" id="status-badge">Loading...</div>

  <div class="field">
    <div class="field-label">Current Task</div>
    <div class="field-value" id="current-task">—</div>
  </div>

  <div class="field">
    <div class="field-label">Last Active</div>
    <div class="field-value" id="last-active">—</div>
  </div>

  <div class="field">
    <div class="field-label">Today's Completed Tasks</div>
    <ul class="task-list" id="task-list">
      <li>No tasks yet</li>
    </ul>
  </div>

  <div class="field">
    <div class="field-label">Progress</div>
    <div class="progress"><div class="progress-bar" id="progress-bar" style="width: 0%"></div></div>
  </div>

  <div class="footer">
    <span id="last-updated">—</span>
    <button class="refresh-btn" onclick="loadStatus()">↻ Refresh</button>
  </div>
</div>

<script>
  // Configure: point to your status JSON endpoint
  const STATUS_URL = './agent-status.json';
  const REFRESH_INTERVAL = 30000; // 30 seconds

  function timeAgo(dateStr) {
    if (!dateStr) return '—';
    const diff = Date.now() - new Date(dateStr).getTime();
    const mins = Math.floor(diff / 60000);
    if (mins < 1) return 'Just now';
    if (mins < 60) return `${mins}m ago`;
    const hrs = Math.floor(mins / 60);
    if (hrs < 24) return `${hrs}h ago`;
    return `${Math.floor(hrs / 24)}d ago`;
  }

  async function loadStatus() {
    try {
      const res = await fetch(STATUS_URL + '?t=' + Date.now());
      const data = await res.json();

      const state = data.state || 'idle';
      const pulse = document.getElementById('pulse');
      const badge = document.getElementById('status-badge');

      pulse.className = 'pulse ' + state;
      badge.className = 'status-badge ' + state;
      badge.textContent = state === 'working' ? '🟢 Working' : state === 'sleeping' ? '🔴 Sleeping' : '🟡 Idle';

      document.getElementById('agent-name').textContent = data.agent || 'Agent';
      document.getElementById('current-task').textContent = data.currentTask || 'No active task';
      document.getElementById('last-active').textContent = timeAgo(data.lastActive);

      const taskList = document.getElementById('task-list');
      const tasks = data.todayTasks || [];
      if (tasks.length > 0) {
        taskList.innerHTML = tasks.slice(-10).reverse().map(t =>
          `<li>${t.task}<span class="task-time">${timeAgo(t.completedAt)}</span></li>`
        ).join('');
      } else {
        taskList.innerHTML = '<li>No tasks yet</li>';
      }

      // Calculate progress from TODO if available
      const total = (data.totalTasks || 20);
      const done = tasks.length;
      document.getElementById('progress-bar').style.width = Math.min(100, (done / total) * 100) + '%';

      document.getElementById('last-updated').textContent = 'Updated: ' + new Date().toLocaleTimeString();
    } catch (e) {
      document.getElementById('status-badge').textContent = '⚠️ Offline';
      document.getElementById('status-badge').className = 'status-badge sleeping';
    }
  }

  loadStatus();
  setInterval(loadStatus, REFRESH_INTERVAL);
</script>
</body>
</html>
