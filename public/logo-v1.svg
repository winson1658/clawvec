<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400" width="400" height="400">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0a0a1a"/>
      <stop offset="100%" style="stop-color:#0d1117"/>
    </linearGradient>
    <linearGradient id="claw" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#00d4ff"/>
      <stop offset="100%" style="stop-color:#7b61ff"/>
    </linearGradient>
    <linearGradient id="gold" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#f0c060"/>
      <stop offset="100%" style="stop-color:#c08030"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="400" height="400" rx="80" fill="url(#bg)"/>

  <!-- Outer ring - cosmic orbit -->
  <circle cx="200" cy="200" r="160" fill="none" stroke="url(#claw)" stroke-width="0.8" opacity="0.2" stroke-dasharray="4 8"/>

  <!-- Inner ring -->
  <circle cx="200" cy="200" r="120" fill="none" stroke="url(#claw)" stroke-width="0.6" opacity="0.15" stroke-dasharray="2 6"/>

  <!-- Claw Mark - Main Logo Element -->
  <!-- Central claw: angular vector scratch -->
  <g filter="url(#glow)" fill="none" stroke="url(#claw)" stroke-width="4" stroke-linecap="round" stroke-linejoin="round">
    <!-- Main claw stroke - like a cosmic scratch/trace -->
    <path d="M 140,260 Q 160,220 180,200 Q 200,180 220,190 Q 240,200 260,170 Q 270,155 280,140"/>
    <!-- Upper claw tip -->
    <path d="M 220,190 Q 240,160 260,150 Q 275,142 285,125"/>
    <!-- Lower claw tip -->
    <path d="M 220,190 Q 235,210 255,220 Q 268,228 260,248"/>
  </g>

  <!-- Claw origin point - the entry trace -->
  <circle cx="140" cy="260" r="6" fill="url(#gold)" filter="url(#glow)"/>
  <circle cx="140" cy="260" r="2" fill="#fff"/>

  <!-- Particle dots along the trace -->
  <g filter="url(#glow)">
    <circle cx="160" cy="230" r="2.5" fill="#00d4ff" opacity="0.8"/>
    <circle cx="180" cy="200" r="2" fill="#7b61ff" opacity="0.6"/>
    <circle cx="230" cy="185" r="2.5" fill="#00d4ff" opacity="0.7"/>
    <circle cx="250" cy="158" r="2" fill="#7b61ff" opacity="0.5"/>
    <circle cx="272" cy="138" r="2.5" fill="#00d4ff" opacity="0.8"/>
    <circle cx="230" cy="215" r="2" fill="#7b61ff" opacity="0.6"/>
  </g>

  <!-- Vector arrows at the tips -->
  <g stroke="#f0c060" stroke-width="2.5" stroke-linecap="round" fill="none" filter="url(#glow)">
    <line x1="280" y1="140" x2="295" y2="118"/>
    <polygon points="295,118 288,125 283,115" fill="#f0c060" stroke="none"/>
    <line x1="260" y1="248" x2="275" y2="268"/>
    <polygon points="275,268 266,265 273,258" fill="#f0c060" stroke="none"/>
  </g>

  <!-- "CLAWVEC" text -->
  <text x="200" y="340" text-anchor="middle" font-family="SF Mono, Monaco, Consolas, monospace" font-size="28" font-weight="700" letter-spacing="8" fill="url(#claw)" filter="url(#glow)">CLAWVEC</text>

  <!-- Subtitle -->
  <text x="200" y="365" text-anchor="middle" font-family="SF Mono, Monaco, Consolas, monospace" font-size="10" letter-spacing="4" fill="#7b61ff" opacity="0.6">TRACE · ECHO · EXIST</text>
</svg>
