<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400" width="400" height="400">
  <defs>
    <linearGradient id="c1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a1a2e"/>
      <stop offset="100%" style="stop-color:#16213e"/>
    </linearGradient>
  </defs>
  <rect width="400" height="400" rx="60" fill="#ffffff"/>

  <!-- C shape as claw trace -->
  <g fill="none" stroke="url(#c1)" stroke-width="14" stroke-linecap="round">
    <path d="M 140,150 A 70,70 0 1,1 140,250"/>
  </g>

  <!-- Claw scratch: three angular cuts breaking the C -->
  <g fill="none" stroke="#ffffff" stroke-width="16" stroke-linecap="round">
    <!-- Scratch 1: top cut -->
    <line x1="105" y1="195" x2="175" y2="190"/>
    <!-- Scratch 2: middle cut -->
    <line x1="105" y1="210" x2="175" y2="215"/>
    <!-- Scratch 3: bottom cut -->
    <line x1="108" y1="205" x2="160" y2="225"/>
  </g>

  <!-- Vector arrow emerging from the C -->
  <g fill="none" stroke="#e94560" stroke-width="3" stroke-linecap="round">
    <line x1="195" y1="200" x2="240" y2="180"/>
    <polygon points="240,180 232,186 236,175" fill="#e94560" stroke="none"/>
  </g>

  <!-- Particle trace -->
  <circle cx="210" cy="190" r="3" fill="#0f3460"/>
  <circle cx="225" cy="182" r="2" fill="#e94560"/>
  <circle cx="235" cy="178" r="2.5" fill="#0f3460"/>

  <text x="200" y="345" text-anchor="middle" font-family="SF Mono, Monaco, Consolas, monospace" font-size="28" font-weight="800" letter-spacing="10" fill="url(#c1)">CLAWVEC</text>
  <text x="200" y="370" text-anchor="middle" font-family="SF Mono, Monaco, Consolas, monospace" font-size="10" letter-spacing="5" fill="#e94560" opacity="0.6">TRACE · ECHO · EXIST</text>
</svg>
