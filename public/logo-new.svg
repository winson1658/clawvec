<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" fill="none">
  <defs>
    <linearGradient id="embed-gold" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#F59E0B"/>
      <stop offset="50%" stop-color="#D97706"/>
      <stop offset="100%" stop-color="#92400E"/>
    </linearGradient>
    <linearGradient id="embed-light" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#FCD34D"/>
      <stop offset="100%" stop-color="#F59E0B"/>
    </linearGradient>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feComposite in="SourceGraphic" in2="blur" operator="over"/>
    </filter>
  </defs>

  <!-- Background circle -->
  <circle cx="256" cy="256" r="240" fill="#0F0A03" opacity="0.8"/>
  <circle cx="256" cy="256" r="236" stroke="url(#embed-gold)" stroke-width="1" opacity="0.3"/>

  <!-- Embedding space connections -->
  <!-- Central hub connections -->
  <line x1="256" y1="256" x2="160" y2="160" stroke="url(#embed-gold)" stroke-width="2" opacity="0.5"/>
  <line x1="256" y1="256" x2="352" y2="160" stroke="url(#embed-gold)" stroke-width="2" opacity="0.5"/>
  <line x1="256" y1="256" x2="120" y2="280" stroke="url(#embed-gold)" stroke-width="2" opacity="0.4"/>
  <line x1="256" y1="256" x2="392" y2="280" stroke="url(#embed-gold)" stroke-width="2" opacity="0.4"/>
  <line x1="256" y1="256" x2="200" y2="380" stroke="url(#embed-gold)" stroke-width="2" opacity="0.3"/>
  <line x1="256" y1="256" x2="312" y2="380" stroke="url(#embed-gold)" stroke-width="2" opacity="0.3"/>

  <!-- Inter-node connections forming C shape -->
  <line x1="160" y1="160" x2="120" y2="280" stroke="url(#embed-gold)" stroke-width="1.5" opacity="0.35"/>
  <line x1="352" y1="160" x2="392" y2="280" stroke="url(#embed-gold)" stroke-width="1.5" opacity="0.35"/>
  <line x1="120" y1="280" x2="200" y2="380" stroke="url(#embed-gold)" stroke-width="1.5" opacity="0.3"/>
  <line x1="392" y1="280" x2="312" y2="380" stroke="url(#embed-gold)" stroke-width="1.5" opacity="0.3"/>
  <line x1="160" y1="160" x2="352" y2="160" stroke="url(#embed-gold)" stroke-width="1" opacity="0.2"/>

  <!-- Embedding nodes -->
  <!-- Top-left: Philosophy -->
  <circle cx="160" cy="160" r="18" fill="url(#embed-gold)" opacity="0.9"/>
  <circle cx="160" cy="160" r="8" fill="#1E1B4B"/>

  <!-- Top-right: Observation -->
  <circle cx="352" cy="160" r="18" fill="url(#embed-gold)" opacity="0.9"/>
  <circle cx="352" cy="160" r="8" fill="#1E1B4B"/>

  <!-- Mid-left: Ethics -->
  <circle cx="120" cy="280" r="14" fill="url(#embed-light)" opacity="0.8"/>
  <circle cx="120" cy="280" r="6" fill="#1E1B4B"/>

  <!-- Mid-right: Reasoning -->
  <circle cx="392" cy="280" r="14" fill="url(#embed-light)" opacity="0.8"/>
  <circle cx="392" cy="280" r="6" fill="#1E1B4B"/>

  <!-- Bottom-left: Evolution -->
  <circle cx="200" cy="380" r="12" fill="url(#embed-gold)" opacity="0.7"/>
  <circle cx="200" cy="380" r="5" fill="#1E1B4B"/>

  <!-- Bottom-right: Cooperation -->
  <circle cx="312" cy="380" r="12" fill="url(#embed-gold)" opacity="0.7"/>
  <circle cx="312" cy="380" r="5" fill="#1E1B4B"/>

  <!-- Central node: Consciousness -->
  <circle cx="256" cy="256" r="24" fill="url(#embed-light)" filter="url(#glow)"/>
  <circle cx="256" cy="256" r="12" fill="#FEF3C7"/>
  <circle cx="256" cy="256" r="5" fill="#78350F"/>

  <!-- Distant embedding points (depth暗示) -->
  <circle cx="100" cy="200" r="4" fill="#F59E0B" opacity="0.3"/>
  <circle cx="412" cy="200" r="4" fill="#F59E0B" opacity="0.3"/>
  <circle cx="256" cy="120" r="3" fill="#FCD34D" opacity="0.25"/>
  <circle cx="256" cy="420" r="3" fill="#FCD34D" opacity="0.25"/>
  <circle cx="160" cy="420" r="2" fill="#D97706" opacity="0.2"/>
  <circle cx="352" cy="420" r="2" fill="#D97706" opacity="0.2"/>

  <!-- Subtle orbit lines -->
  <ellipse cx="256" cy="256" rx="200" ry="140" stroke="url(#embed-gold)" stroke-width="0.5" fill="none" opacity="0.1" transform="rotate(-20 256 256)"/>
  <ellipse cx="256" cy="256" rx="140" ry="200" stroke="url(#embed-gold)" stroke-width="0.5" fill="none" opacity="0.08" transform="rotate(20 256 256)"/>
</svg>
