<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" fill="none">
  <defs>
    <linearGradient id="cube-gold" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#FCD34D"/>
      <stop offset="50%" stop-color="#F59E0B"/>
      <stop offset="100%" stop-color="#D97706"/>
    </linearGradient>
  </defs>
  <rect width="512" height="512" rx="96" fill="#0F0A03"/>
  <!-- Cube wireframe -->
  <line x1="256" y1="120" x2="400" y2="200" stroke="url(#cube-gold)" stroke-width="5" stroke-linecap="round" opacity="0.7"/>
  <line x1="400" y1="200" x2="400" y2="320" stroke="url(#cube-gold)" stroke-width="5" stroke-linecap="round" opacity="0.7"/>
  <line x1="400" y1="320" x2="256" y2="400" stroke="url(#cube-gold)" stroke-width="5" stroke-linecap="round" opacity="0.7"/>
  <line x1="256" y1="400" x2="112" y2="320" stroke="url(#cube-gold)" stroke-width="5" stroke-linecap="round" opacity="0.7"/>
  <line x1="112" y1="320" x2="112" y2="200" stroke="url(#cube-gold)" stroke-width="5" stroke-linecap="round" opacity="0.7"/>
  <line x1="112" y1="200" x2="256" y2="120" stroke="url(#cube-gold)" stroke-width="5" stroke-linecap="round" opacity="0.7"/>
  <line x1="256" y1="200" x2="400" y2="200" stroke="url(#cube-gold)" stroke-width="3" stroke-linecap="round" opacity="0.4"/>
  <line x1="256" y1="200" x2="112" y2="200" stroke="url(#cube-gold)" stroke-width="3" stroke-linecap="round" opacity="0.4"/>
  <line x1="256" y1="200" x2="256" y2="120" stroke="url(#cube-gold)" stroke-width="3" stroke-linecap="round" opacity="0.4"/>
  <line x1="256" y1="200" x2="256" y2="400" stroke="url(#cube-gold)" stroke-width="3" stroke-linecap="round" opacity="0.4"/>
  <line x1="256" y1="200" x2="400" y2="320" stroke="url(#cube-gold)" stroke-width="3" stroke-linecap="round" opacity="0.4"/>
  <line x1="256" y1="200" x2="112" y2="320" stroke="url(#cube-gold)" stroke-width="3" stroke-linecap="round" opacity="0.4"/>
  <!-- Nodes at vertices -->
  <circle cx="256" cy="120" r="16" fill="url(#cube-gold)"/>
  <circle cx="400" cy="200" r="16" fill="url(#cube-gold)"/>
  <circle cx="400" cy="320" r="16" fill="url(#cube-gold)"/>
  <circle cx="256" cy="400" r="16" fill="url(#cube-gold)"/>
  <circle cx="112" cy="320" r="16" fill="url(#cube-gold)"/>
  <circle cx="112" cy="200" r="16" fill="url(#cube-gold)"/>
  <!-- Center node -->
  <circle cx="256" cy="256" r="24" fill="#FCD34D"/>
  <circle cx="256" cy="256" r="10" fill="#78350F"/>
</svg>